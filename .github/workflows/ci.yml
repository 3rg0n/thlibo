name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel stale runs for the same branch/PR as new ones start.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Force every JavaScript action in this workflow onto Node.js 24.
# Node 20 is being removed from the runners on 2026-09-16 and was
# already deprecation-warning-loud on our v0.2.0 release run. This
# flag is GitHub's supported opt-in that makes Node 24 active before
# the default flip on 2026-06-02 (the new default) and before the
# v4/v5 action tags we SHA-pinned ship new major versions that
# embed Node 24 natively. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.26.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Set up Python
        # python3 is required for the built-in script processors'
        # on-disk C6 integration test, and will be needed by
        # `thlibo exec` at runtime as well.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        # 120s timeout is generous; current suite is ~70s on a dev
        # box, most of which is the daemon integration tests.
        run: go test ./... -timeout 120s

  scanners:
    name: scanners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck (informational for stdlib)
        # govulncheck exit code 3 means "findings exist". We run it
        # at `-show=summary` so the human output is readable in logs,
        # and intentionally don't fail the job: Go stdlib CVEs
        # follow the Go compiler's release cadence, not ours, and
        # a fresh CVE every month would block unrelated work. We
        # rely on `-C <path>` + the summary to catch findings in
        # *our imports*, which is where a real action item would
        # come from.
        run: |
          set +e
          OUT=$(govulncheck -show=summary ./...)
          echo "$OUT"
          # Fail only if a third-party dependency (non-stdlib) has
          # an exploitable CVE. "Standard library" findings are
          # informational and chased via Go version bumps on our
          # own schedule.
          if echo "$OUT" | grep -E '^Module: ' | grep -v '^Module: Standard library$' | grep -q '.'; then
            echo "::error ::govulncheck found a CVE in a third-party dependency"
            exit 1
          fi
          exit 0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec (shipped code only)
        # .test/ is a gitignored dev sandbox; we scan only what we ship.
        run: gosec ./cmd/... ./internal/... ./processors/...

      - name: Set up Python
        # semgrep is python-based.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install semgrep
        run: pip install semgrep
      - name: semgrep
        # --error makes medium+ findings fail the job; auto config
        # pulls in the semgrep-registry rules for Go.
        run: semgrep --config=auto --error --quiet ./cmd ./internal ./processors

  secrets:
    name: secret-scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so gitleaks can look at commit diffs.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
