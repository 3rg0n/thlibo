name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel stale runs for the same branch/PR as new ones start.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Set up Python
        # python3 is required for the built-in script processors'
        # on-disk C6 integration test, and will be needed by
        # `thlibo exec` at runtime as well.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        # 120s timeout is generous; current suite is ~70s on a dev
        # box, most of which is the daemon integration tests.
        run: go test ./... -timeout 120s

  scanners:
    name: scanners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec (shipped code only)
        # .test/ is a gitignored dev sandbox; we scan only what we ship.
        run: gosec ./cmd/... ./internal/... ./processors/...

      - name: Set up Python
        # semgrep is python-based.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install semgrep
        run: pip install semgrep
      - name: semgrep
        # --error makes medium+ findings fail the job; auto config
        # pulls in the semgrep-registry rules for Go.
        run: semgrep --config=auto --error --quiet ./cmd ./internal ./processors

  secrets:
    name: secret-scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can look at commit diffs.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
