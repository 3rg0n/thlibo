name: Release

on:
  push:
    tags:
      - "v*"

# One release run at a time per tag; don't try to be clever.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # Required to upload release assets.
  id-token: write  # Required by cosign keyless (OIDC to Fulcio).
  attestations: write  # Required to attach Sigstore attestations to the release.

# upload-artifact@v5 and download-artifact@v5 are still Node 20;
# this flag runs their bundles on Node 24 until the next major lands.
# See ci.yml for the full rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5 (node24)

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6 (node24)
        with:
          go-version: "1.26.3"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin
          LDFLAGS="-s -w -X github.com/3rg0n/thlibo/internal/version.Tag=${{ github.ref_name }}"
          go build -trimpath -ldflags="$LDFLAGS" \
            -o dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin/thlibo${{ matrix.ext }} \
            ./cmd/thlibo

      - name: Copy docs into bundle
        run: |
          DIR=dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}
          cp README.md CHANGELOG.md "$DIR/"
          if [ -f LICENSE ]; then cp LICENSE "$DIR/"; fi

      - name: Archive (tar.gz for Unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar -czf thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz thlibo-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Archive (zip for Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip -r thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.zip thlibo-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: thlibo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  # Run scripts/install.{sh,ps1} against the just-built archive on a
  # clean runner, asserting the install actually wires up the binary,
  # ~/.thlibo, and ~/.claude/settings.json. Issue #20: v0.6.0 shipped
  # three regressions in code that only runs at install time
  # (cmd/thlibod build, cosign v3 deprecation, --pull-engine flag
  # removal); CI's go-test/scanners/cosign-self-test didn't touch any
  # of them. This job closes that gap so the release job can't ship
  # a broken installer.
  verify-install:
    name: verify-install (${{ matrix.os }})
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: thlibo-linux-amd64
            archive: thlibo-linux-amd64.tar.gz
            shell: bash
          - os: windows-latest
            artifact: thlibo-windows-amd64
            archive: thlibo-windows-amd64.zip
            shell: pwsh
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5 (node24)

      - name: Download archive artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Run install.sh against local archive (linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          THLIBO_LOCAL_ARCHIVE: ${{ github.workspace }}/artifact/${{ matrix.archive }}
          THLIBO_VERSION: ${{ github.ref_name }}
          THLIBO_SKIP_INSTALL: "1"  # don't fetch inferd; we're testing install.sh, not inferd
        run: |
          set -euxo pipefail
          bash scripts/install.sh
          # Post-conditions
          test -x "$HOME/.local/bin/thlibo"
          actual=$("$HOME/.local/bin/thlibo" version)
          expected="${{ github.ref_name }}"
          if [ "$actual" != "$expected" ]; then
            echo "version mismatch: got '$actual', want '$expected'" >&2
            exit 1
          fi
          echo "OK: install.sh against local archive produced thlibo $actual"

      - name: Run install.ps1 against local archive (windows)
        if: matrix.os == 'windows-latest'
        env:
          THLIBO_LOCAL_ARCHIVE: ${{ github.workspace }}\artifact\${{ matrix.archive }}
          THLIBO_VERSION: ${{ github.ref_name }}
          THLIBO_SKIP_INSTALL: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\install.ps1
          $bin = Join-Path $env:LOCALAPPDATA 'thlibo\bin\thlibo.exe'
          if (-not (Test-Path $bin)) { throw "binary missing at $bin" }
          $actual = & $bin version
          $expected = "${{ github.ref_name }}"
          if ($actual -ne $expected) { throw "version mismatch: got '$actual', want '$expected'" }
          Write-Host "OK: install.ps1 against local archive produced thlibo $actual"

  release:
    name: release
    needs: [build, verify-install]
    runs-on: ubuntu-latest
    # Required for the keyless OIDC-token exchange with Fulcio that
    # cosign uses to sign without long-lived private keys. See
    # THREAT_MODEL.md findings #27 and #28.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5 (node24)

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum thlibo-*.tar.gz thlibo-*.zip > SHA256SUMS 2>/dev/null || true
          cat SHA256SUMS

      # CycloneDX SBOM generated from the repo state at the release
      # tag. Published alongside the archives so downstream consumers
      # (enterprise procurement, Dependabot-style scanners) have a
      # machine-readable manifest of every Go module that went into
      # the build. See THREAT_MODEL.md finding #28.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/thlibo-sbom.cdx.json
          artifact-name: thlibo-sbom.cdx.json

      # Install cosign so we can sign the archives + checksums + SBOM
      # in the next step. Pinned to v3's latest known-good commit; the
      # cosign binary itself is SHA-verified by the action internally.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signing via Sigstore. A `.cosign-bundle` (the v3
      # bundle format containing both signature and certificate)
      # lands next to each file. Fulcio issues a short-lived cert
      # bound to this workflow's OIDC identity
      # (3rg0n/thlibo/.../release.yml @ the release tag) and Rekor
      # records the signature in the transparency log. Consumers
      # verify with:
      #
      #   cosign verify-blob \
      #     --certificate-identity "https://github.com/3rg0n/thlibo/.github/workflows/release.yml@refs/tags/<TAG>" \
      #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #     --bundle file.tar.gz.cosign-bundle \
      #     file.tar.gz
      #
      # See THREAT_MODEL.md finding #27.
      - name: Sign artefacts with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd dist
          for f in thlibo-*.tar.gz thlibo-*.zip SHA256SUMS thlibo-sbom.cdx.json; do
            [ -f "$f" ] || continue
            echo "Signing $f"
            cosign sign-blob --yes \
              --bundle "$f.cosign-bundle" \
              "$f"
          done
          ls -la

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3 (node24)
        with:
          files: |
            dist/thlibo-*.tar.gz
            dist/thlibo-*.zip
            dist/SHA256SUMS
            dist/thlibo-sbom.cdx.json
            dist/*.cosign-bundle
          generate_release_notes: true
          draft: false
          # Mark any tag carrying a pre-release suffix (e.g. v0.7.4-rc.1,
          # v0.7.4-beta.2) as a GitHub pre-release. This keeps it OUT of
          # the /releases/latest endpoint thlibo's update check + fresh
          # installs read, so an RC is never auto-pulled by real users —
          # it can only be installed by explicit --version pin. Stable
          # tags (no hyphen) publish as normal latest releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            # thlibo ${{ github.ref_name }}

            Local-Gemma tool-output compression middleware for Claude
            Code + Codex CLI. Inference is delegated to
            [inferd](https://github.com/3rg0n/inferd) — thlibo's
            installer detects/installs inferd as a sidecar.

            ## Binaries

            Cross-platform binaries are attached as tarballs/zip.
            Each bundle contains `bin/thlibo`, `README.md`,
            `CHANGELOG.md`, and `LICENSE`.

            ## Verifying signatures

            Each archive, `SHA256SUMS`, and the CycloneDX SBOM are
            signed by cosign via Sigstore's keyless flow. No public
            key to manage — the identity is anchored in this
            workflow's GitHub OIDC token.

                cosign verify-blob \
                  --certificate-identity \
                    "https://github.com/3rg0n/thlibo/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
                  --certificate-oidc-issuer \
                    "https://token.actions.githubusercontent.com" \
                  --bundle thlibo-linux-amd64.tar.gz.cosign-bundle \
                  thlibo-linux-amd64.tar.gz

            The transparency-log entry is automatically published to
            Rekor (`rekor.sigstore.dev`); cosign verifies it as part
            of the flow above.

            ## SBOM

            `thlibo-sbom.cdx.json` is a CycloneDX SBOM generated from
            the repo at the release tag. Signed with cosign like the
            archives.

            ## Inferd sidecar

            On first run, `thlibo install` probes for a running inferd
            admin socket and consumes it if present; otherwise it
            fetches the matching inferd release for the host platform
            and runs inferd's installer. The model GGUF is downloaded
            once by inferd into a shared per-platform model store.
