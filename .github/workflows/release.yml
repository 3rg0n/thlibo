name: Release

on:
  push:
    tags:
      - "v*"

# One release run at a time per tag; don't try to be clever.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # Required to upload release assets.
  id-token: write  # Required by cosign keyless (OIDC to Fulcio).
  attestations: write  # Required to attach Sigstore attestations to the release.

# Force every JavaScript action in this workflow onto Node.js 24.
# See the note in ci.yml for context; same rationale applies here.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Download the GGUF once, compute its SHA, then reuse that hash
  # across every per-platform build. The GGUF itself is NOT
  # attached to the release (5.4 GB exceeds GitHub's 2 GiB
  # release-asset cap); users pull it directly from HuggingFace
  # via `thlibo pull`, and the pinned SHA injected into the binary
  # guards integrity.
  pin-model:
    name: pin-model
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - name: Download GGUF
        run: |
          mkdir -p /tmp/model
          curl -fsSL \
            -o /tmp/model/gemma.gguf \
            https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-UD-Q4_K_XL.gguf
      - name: Compute SHA256
        id: hash
        run: |
          sha=$(sha256sum /tmp/model/gemma.gguf | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "Model SHA: $sha"

  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: pin-model
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Download llamafile engine
        run: |
          mkdir -p dist-engine
          curl -fsSL \
            -o dist-engine/thlibo-engine${{ matrix.ext }} \
            https://github.com/mozilla-ai/llamafile/releases/download/0.10.1/llamafile-0.10.1
          chmod +x dist-engine/thlibo-engine${{ matrix.ext }}
          echo "3cc6ea1a5af07813d6c9f7459a64ec28345352c8322d2b355b6715847871bc13  dist-engine/thlibo-engine${{ matrix.ext }}" | sha256sum --check

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          MODEL_SHA: ${{ needs.pin-model.outputs.sha256 }}
        run: |
          mkdir -p dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin
          LDFLAGS="-s -w -X github.com/3rg0n/thlibo/internal/install.pinnedGemma4E4BQ4KM=$MODEL_SHA"
          go build -trimpath -ldflags="$LDFLAGS" \
            -o dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin/thlibo${{ matrix.ext }} \
            ./cmd/thlibo
          go build -trimpath -ldflags="$LDFLAGS" \
            -o dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin/thlibod${{ matrix.ext }} \
            ./cmd/thlibod
          cp dist-engine/thlibo-engine${{ matrix.ext }} \
            dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin/thlibo-engine${{ matrix.ext }}

      - name: Copy docs into bundle
        run: |
          DIR=dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}
          cp README.md CHANGELOG.md "$DIR/"
          # LICENSE will be added when the repo picks one; for now,
          # a placeholder so users see a file in the expected slot.
          if [ -f LICENSE ]; then cp LICENSE "$DIR/"; fi

      - name: Archive (tar.gz for Unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar -czf thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz thlibo-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Archive (zip for Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip -r thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.zip thlibo-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: thlibo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    name: release
    needs: [pin-model, build]
    runs-on: ubuntu-latest
    # Required for the keyless OIDC-token exchange with Fulcio that
    # cosign uses to sign without long-lived private keys. See
    # THREAT_MODEL.md findings #27 and #28.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum thlibo-*.tar.gz thlibo-*.zip > SHA256SUMS 2>/dev/null || true
          cat SHA256SUMS

      # CycloneDX SBOM generated from the repo state at the release
      # tag. Published alongside the archives so downstream consumers
      # (enterprise procurement, Dependabot-style scanners) have a
      # machine-readable manifest of every Go module that went into
      # the build. See THREAT_MODEL.md finding #28.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/thlibo-sbom.cdx.json
          artifact-name: thlibo-sbom.cdx.json

      # Install cosign so we can sign the archives + checksums + SBOM
      # in the next step. Pinned to v3's latest known-good commit; the
      # cosign binary itself is SHA-verified by the action internally.
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # Keyless signing via Sigstore. Each .sig and .pem lands next
      # to the file it signs; Fulcio issues a short-lived cert bound
      # to this workflow's OIDC identity (3rg0n/thlibo/.../release.yml
      # @ the release tag) and Rekor records the signature in the
      # transparency log. Consumers verify with:
      #
      #   cosign verify-blob \
      #     --certificate-identity "https://github.com/3rg0n/thlibo/.github/workflows/release.yml@refs/tags/<TAG>" \
      #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #     --signature file.tar.gz.sig --certificate file.tar.gz.pem \
      #     file.tar.gz
      #
      # See THREAT_MODEL.md finding #27.
      - name: Sign artefacts with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd dist
          for f in thlibo-*.tar.gz thlibo-*.zip SHA256SUMS thlibo-sbom.cdx.json; do
            [ -f "$f" ] || continue
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done
          ls -la

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/thlibo-*.tar.gz
            dist/thlibo-*.zip
            dist/SHA256SUMS
            dist/thlibo-sbom.cdx.json
            dist/*.sig
            dist/*.pem
          generate_release_notes: true
          draft: false
          body: |
            # thlibo ${{ github.ref_name }}

            Local-Gemma tool-output compression middleware for Claude
            Code + Codex CLI.

            ## Binaries

            Cross-platform binaries are attached as tarballs/zip.
            Each bundle contains `bin/thlibo`, `bin/thlibod`,
            `README.md`, `CHANGELOG.md`, `LICENSE`.

            ## Verifying signatures

            Each archive, `SHA256SUMS`, and the CycloneDX SBOM are
            signed by cosign via Sigstore's keyless flow. No public
            key to manage — the identity is anchored in this
            workflow's GitHub OIDC token.

                cosign verify-blob \
                  --certificate-identity \
                    "https://github.com/3rg0n/thlibo/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
                  --certificate-oidc-issuer \
                    "https://token.actions.githubusercontent.com" \
                  --signature thlibo-linux-amd64.tar.gz.sig \
                  --certificate thlibo-linux-amd64.tar.gz.pem \
                  thlibo-linux-amd64.tar.gz

            The transparency-log entry is automatically published to
            Rekor (`rekor.sigstore.dev`); cosign verifies it as part
            of the flow above.

            ## SBOM

            `thlibo-sbom.cdx.json` is a CycloneDX SBOM generated from
            the repo at the release tag. Signed with cosign like the
            archives.

            ## Model (pulled separately)

            The canonical GGUF
            (`unsloth/gemma-4-E4B-it-GGUF/gemma-4-E4B-it-UD-Q4_K_XL.gguf`,
            ~5.1 GB) is not attached because it exceeds GitHub's
            2 GiB asset cap. After installing, run:

                thlibo pull gemma-4-e4b

            The binary has the expected SHA-256 pinned at build
            time, so `thlibo pull` verifies integrity automatically.
            No network trust required beyond HuggingFace's TLS +
            our pin.
