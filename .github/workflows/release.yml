name: Release

on:
  push:
    tags:
      - "v*"

# One release run at a time per tag; don't try to be clever.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # Required to upload release assets.

jobs:
  # Download the GGUF once, compute its SHA, then reuse that hash
  # across every per-platform build. The GGUF itself is NOT
  # attached to the release (5.4 GB exceeds GitHub's 2 GiB
  # release-asset cap); users pull it directly from HuggingFace
  # via `thlibo pull`, and the pinned SHA injected into the binary
  # guards integrity.
  pin-model:
    name: pin-model
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - name: Download GGUF
        run: |
          mkdir -p /tmp/model
          curl -fsSL \
            -o /tmp/model/gemma.gguf \
            https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-UD-Q4_K_XL.gguf
      - name: Compute SHA256
        id: hash
        run: |
          sha=$(sha256sum /tmp/model/gemma.gguf | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "Model SHA: $sha"

  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: pin-model
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          MODEL_SHA: ${{ needs.pin-model.outputs.sha256 }}
        run: |
          mkdir -p dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin
          LDFLAGS="-s -w -X github.com/3rg0n/thlibo/internal/install.pinnedGemma4E4BQ4KM=$MODEL_SHA"
          go build -trimpath -ldflags="$LDFLAGS" \
            -o dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin/thlibo${{ matrix.ext }} \
            ./cmd/thlibo
          go build -trimpath -ldflags="$LDFLAGS" \
            -o dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}/bin/thlibod${{ matrix.ext }} \
            ./cmd/thlibod

      - name: Copy docs into bundle
        run: |
          DIR=dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}
          cp README.md CHANGELOG.md "$DIR/"
          # LICENSE will be added when the repo picks one; for now,
          # a placeholder so users see a file in the expected slot.
          if [ -f LICENSE ]; then cp LICENSE "$DIR/"; fi

      - name: Archive (tar.gz for Unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar -czf thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz thlibo-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Archive (zip for Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip -r thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.zip thlibo-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thlibo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/thlibo-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    name: release
    needs: [pin-model, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum thlibo-*.tar.gz thlibo-*.zip > SHA256SUMS 2>/dev/null || true
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/thlibo-*.tar.gz
            dist/thlibo-*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          draft: true  # Human reviews before going public.
          body: |
            # thlibo v0.1.0 draft

            First release. Local-Gemma tool-output compression
            middleware for Claude Code + Codex CLI.

            ## Binaries

            Cross-platform binaries are attached as tarballs/zip.
            Each bundle contains `bin/thlibo`, `bin/thlibod`,
            `README.md`, `CHANGELOG.md`.

            ## Model (pulled separately)

            The canonical GGUF
            (`bartowski/google_gemma-4-E4B-it-GGUF/google_gemma-4-E4B-it-Q4_K_M.gguf`,
            5.4 GB) is not attached to this release: it exceeds
            GitHub's 2 GiB asset cap. After installing, run:

                thlibo pull gemma-4-e4b

            The binary has the expected SHA-256 pinned at build
            time, so `thlibo pull` verifies integrity automatically.
            No network trust required beyond HuggingFace's TLS +
            our pin.

            See [.plan/release-notes-0.1.0.md](../blob/main/.plan/release-notes-0.1.0.md)
            for token-savings measurements and the live Claude Code
            E2E evidence.
