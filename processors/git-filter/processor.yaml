name: git-filter
type: script
entry: run.py
match: "^(On branch |HEAD detached|Changes |Untracked files:|nothing to commit|diff --git|commit [0-9a-f]{7,40}$)"
description: >
  Compresses git status, diff, and log output. Keeps branch name,
  modified/untracked file paths, commit hashes, and per-file diff
  headers. Drops repeated blank lines, diff hunks, full blame/patch
  bodies, and "use 'git ...'" hint lines.
