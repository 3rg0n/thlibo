name: lint-filter
type: script
entry: run.py
# Match-driven (fires on lint-shaped output from any source) AND
# command-wrapped (see commands: below) so single-purpose scanners are
# routed even when their output shape is novel. The final alternative
# matches gosec's `[file:line] - Gxxx (CWE-nn):` bracket format.
match: "(?m)^(?:[^\\n:]+):\\d+(?::\\d+)?:\\s+(?:warning|error|note|info|style|[CWERF]):\\s|(?:[^\\n:]+):\\d+(?::\\d+)?:\\s+[EWFCBI]\\d{2,4}\\s|(?:[^\\n:]+):\\d+(?::\\d+)?:\\s+[A-Z]+\\d{3,4}:\\s|(?:[^\\n:]+):\\s*line\\s+\\d+,\\s*col\\s+\\d+,\\s+(?:warning|error)\\s|(?:[^\\n:]+):\\d+(?::\\d+)?:\\s+[^\\n]+\\s\\([\\w./-]+\\)$|(?:[^\\n:]+)\\(\\d+,\\d+\\):\\s+(?:error|warning)\\s+TS\\d+:\\s|^\\s*(?:warning|error|note|help)(?:\\[[\\w:]+\\])?:\\s+\\S|^\\s*-->\\s+\\S+:\\d+:\\d+\\s*$|^\\s*[A-Z]{1,3}\\d{2,4}(?:\\s+\\[\\*\\])?\\s+\\S|^\\[[^\\n\\]]+:\\d+\\]\\s+-\\s+G\\d+\\s+\\(CWE-\\d+\\):"
# Commands the rewrite hook wraps with `thlibo exec --` so their stdout
# flows through this filter. Only single-purpose linters/scanners whose
# argv[0] unambiguously means "lint output" are listed. `go` is
# deliberately EXCLUDED: argv[0]=go is multiplexed (go vet → lint, but
# go build/run/test → not), and commands: matches argv[0] exactly, so
# wrapping `go` would over-capture builds and tests. `go test` is the
# separate go-test-filter (#42); `go vet` awaits subcommand-aware
# matching. make / docker build are intentionally not wrapped either.
commands:
  - gosec
  - staticcheck
  - golangci-lint
  - shellcheck
description: >
  Distills lint output for an AI client. Two paths:
    - Verbose (multi-line block) inputs are parsed and collapsed
      into one TSV row per finding, plus a `-`-prefixed help-row
      continuation when the linter offered a suggestion.
      Covers rustc / clippy / ruff verbose blocks (` --> file:line:col`
      style), gcc / clang verbose with source-snippet + caret, and
      eslint stylish (file-header + indented rows).
    - Terse (single-line) inputs are parsed and re-emitted in the
      same TSV schema. Covers eslint compact + unix, golangci-lint,
      gosec (`[file:line] - Gxxx (CWE-nn): msg (..., Severity: Y)`),
      ruff concise, mypy, shellcheck, rubocop, stylelint, tsc
      (parens format), clippy --message-format=short.

  Output schema (4 tab-separated columns):
    severity-letter \t loc \t rule \t msg

  Severity letters: E / W / I / N / S / C / R. A `-` row immediately
  beneath any finding carries the linter's `help: ...` suggestion
  verbatim, so the AI can write a fix without re-running the linter.

  Monotonic guarantee: distilled output is returned only when its
  UTF-8 byte count is strictly smaller than the input's. Otherwise
  the input is passed through unchanged. No code path can grow what
  the AI client receives.

  Knobs:
    LINT_MAX_PER_RULE  cap per rule-id (0 = no cap)  default 0

  Falls back to input verbatim on any unhandled exception.
