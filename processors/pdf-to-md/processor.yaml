name: pdf-to-md
type: script
entry: run.py
# PDFs start with %PDF-<version>. The fast-path regex runs against
# the input bytes, so the magic match works on any born-digital PDF.
# Scanned PDFs (image-only) also start with %PDF-, so they hit the
# same processor — the script's per-page logic decides what to do
# when text extraction comes up empty.
match: "^%PDF-"
commands: []
description: >
  Convert a PDF to GitHub-flavored markdown. Born-digital text
  extracts directly via pdfplumber; tables come out as markdown
  tables. Scanned (image-only) PDFs are OCR'd: the Go side renders
  each page and sends it to inferd's Gemma vision model, which returns
  the transcribed text (ADR 0009). This script itself is text-only and
  emits a `[scanned page N]` placeholder per image page; the caller
  (`thlibo case`) detects that low-value output and takes over the
  vision OCR. When inferd's vision path is unreachable, the placeholder
  is left in place (fail-open). See ADR 0007 (extraction) + ADR 0009
  (vision OCR).
