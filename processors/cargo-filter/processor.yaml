name: cargo-filter
type: script
entry: run.py
match: "^(\\s*Compiling |\\s*Finished|\\s*Running|error(\\[E\\d+\\])?:|warning:|\\s*Downloaded |test result:|running \\d+ tests?$)"
commands:
  - cargo
description: >
  Compresses cargo build, test, and clippy output. Keeps error/warning
  lines with their code and file:line pointers, test summaries, final
  "Finished" line. Drops per-crate "Compiling"/"Downloaded" chatter
  and verbose suggestion blocks.
